{% extends "base_v2.html" %}

{% block title %}Charts{% endblock %}

{% block content %}
<section class="hero-card">
    <div>
        <p class="eyebrow">Visuals</p>
        <h1>Simple charts</h1>
        <p class="subtle">Daily trade counts, daily volume, and a YES/NO split.</p>
    </div>
</section>

<section class="two-col">
    <article class="card">
        <h2>Trades per day</h2>
        <canvas id="tradesChart"></canvas>
    </article>
    <article class="card">
        <h2>Volume per day</h2>
        <canvas id="volumeChart"></canvas>
    </article>
</section>

<section class="card">
    <h2>YES / NO split</h2>
    <canvas id="sideChart"></canvas>
</section>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
const data = {{ chart_data|safe }};

new Chart(document.getElementById('tradesChart'), {
    type: 'line',
    data: {
        labels: data.labels,
        datasets: [{ label: 'Trades', data: data.trades_per_day, borderColor: '#2563eb', backgroundColor: 'rgba(37,99,235,0.15)', fill: true }]
    }
});

new Chart(document.getElementById('volumeChart'), {
    type: 'bar',
    data: {
        labels: data.labels,
        datasets: [{ label: 'Volume', data: data.volume_per_day, backgroundColor: '#14b8a6' }]
    }
});

new Chart(document.getElementById('sideChart'), {
    type: 'pie',
    data: {
        labels: data.side_labels,
        datasets: [{ data: data.side_counts, backgroundColor: ['#22c55e', '#ef4444'] }]
    }
});
</script>
{% endblock %}
