<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Polymarket Trades{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <script>
    // Apply theme before paint to avoid flash
    (function() {
        const saved = localStorage.getItem('theme');
        if (saved === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    })();
    </script>
</head>
<body>
    <header>
        <nav style="display: flex; justify-content: space-between; align-items: center;">
            <h1><a href="/wallets">📊 Polymarket Trades Tracker</a></h1>
            <div style="display: flex; align-items: center; gap: 1rem;">
                <button class="theme-toggle" id="themeToggle" title="Toggle dark mode" onclick="toggleTheme()">
                    <span id="themeIcon">🌙</span>
                    <span id="themeLabel">Dark</span>
                </button>
                <a href="/notifications" class="notification-icon" title="Notifications">
                    🔔
                    <span class="notification-badge" id="notif-badge" style="display: none;">0</span>
                </a>
            </div>
        </nav>
    </header>
    
    <script>
    function toggleTheme() {
        const html = document.documentElement;
        const isDark = html.getAttribute('data-theme') === 'dark';
        if (isDark) {
            html.removeAttribute('data-theme');
            localStorage.setItem('theme', 'light');
        } else {
            html.setAttribute('data-theme', 'dark');
            localStorage.setItem('theme', 'dark');
        }
        updateToggleLabel();
    }

    function updateToggleLabel() {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        const icon = document.getElementById('themeIcon');
        const label = document.getElementById('themeLabel');
        if (icon) icon.textContent = isDark ? '☀️' : '🌙';
        if (label) label.textContent = isDark ? 'Light' : 'Dark';
    }

    // Set correct label on load
    document.addEventListener('DOMContentLoaded', updateToggleLabel);

    // Update notification count on page load
    async function updateNotificationBadge() {
        try {
            const response = await fetch('/notifications/count');
            const data = await response.json();
            const badge = document.getElementById('notif-badge');
            if (badge) {
                if (data.count > 0) {
                    badge.textContent = data.count;
                    badge.style.display = 'inline-block';
                } else {
                    badge.style.display = 'none';
                }
            }
        } catch (e) {
            console.error('Failed to fetch notification count:', e);
        }
    }
    updateNotificationBadge();
    // Refresh every 30 seconds
    setInterval(updateNotificationBadge, 30000);
    </script>
    
    <main>
        {% block content %}{% endblock %}
    </main>
    
    <footer>
        <p>V1 - Trades only, no analytics</p>
    </footer>
</body>
</html>
