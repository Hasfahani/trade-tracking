{% extends "base_v2.html" %}

{% block title %}Notification Settings{% endblock %}

{% block content %}
<section class="hero-card">
    <div>
        <p class="eyebrow">Notification controls</p>
        <h1>Alert settings</h1>
        <p class="subtle">Tune sound, minimum trade value, and duplicate suppression.</p>
    </div>
</section>

<section class="card">
    <form method="post" class="grid-form">
        <label class="checkbox-row">
            <input type="checkbox" name="sound_enabled" value="1" {% if settings.sound_enabled %}checked{% endif %}>
            <span>Enable browser sound/notification prompts</span>
        </label>
        <label>
            Minimum trade value
            <input type="number" step="0.01" name="min_trade_value" value="{{ settings.min_trade_value or 0 }}">
        </label>
        <label>
            Dedupe window seconds
            <input type="number" name="dedupe_window_seconds" value="{{ settings.dedupe_window_seconds or 120 }}">
        </label>
        <button type="submit" class="btn btn-primary">Save settings</button>
    </form>
</section>
{% endblock %}
